# nginx внутри контейнера web: статика SPA + прокси /api на api-контейнер.
# TLS и строгие security-заголовки — на infra-nginx (см. deploy/nginx/technic.conf).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 2m;         # файлы грузятся напрямую в S3, не через API
  proxy_read_timeout 60s;

  # Важно: имя контейнера/сервиса, не короткое `api` —
  # на сети edge алиас `api` есть и у zakupki-api → round-robin 404.
  location /api/ {
    proxy_pass http://technic-api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Не перезаписывать proto от edge-nginx (иначе secure-cookie ломаются)
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # Метка версии: всегда свежая (клиент уже шлёт no-store; подстраховка на уровне прокси).
  # add_header внутри location отменяет наследование server-level заголовков — дублируем их.
  location = /version.json {
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  # index.html всегда ревалидируется, чтобы reload после деплоя тянул свежие хеши ассетов.
  # SPA-fallback (try_files ... /index.html) внутренне попадает сюда и тоже получает no-cache.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  # Хешированные ассеты Vite — иммутабельны, кешируем надолго (ускоряет повторные загрузки).
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
}
