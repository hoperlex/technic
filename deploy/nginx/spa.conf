# nginx внутри контейнера web: статика SPA + прокси /api на api-контейнер.
# TLS и строгие security-заголовки — на edge-nginx хоста (см. portal.conf.example).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 2m;         # файлы грузятся напрямую в S3, не через API
  proxy_read_timeout 60s;

  # Важно: имя контейнера/сервиса, не короткое `api` —
  # на сети edge алиас `api` есть и у zakupki-api → round-robin 404.
  location /api/ {
    proxy_pass http://technic-api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Не перезаписывать proto от edge-nginx (иначе secure-cookie ломаются)
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
}
