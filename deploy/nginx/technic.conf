# technic / auto — auto.su10.ru (primary). nip.io redirects here.
# Кладётся в /opt/infra/nginx/conf.d/technic.conf, затем:
#   docker exec infra-nginx nginx -t && docker exec infra-nginx nginx -s reload
# Динамический резолвинг имён контейнеров (Docker DNS).
# Не трогать соседние vhost в conf.d (zakupki, estimat, billhub, keycloak).

server {
    listen 80;
    server_name auto.su10.ru auto.89-232-188-170.nip.io;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://auto.su10.ru$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name auto.89-232-188-170.nip.io;

    ssl_certificate     /etc/letsencrypt/live/auto.89-232-188-170.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auto.89-232-188-170.nip.io/privkey.pem;

    return 301 https://auto.su10.ru$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name auto.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/auto.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auto.su10.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'; connect-src 'self' https://s3.cloud.ru https://*.s3.cloud.ru" always;

    client_max_body_size 2m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $web technic-web;

    location / {
        proxy_pass http://$web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
