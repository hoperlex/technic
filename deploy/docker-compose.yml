# Production Compose — изоляция как у zakupki/estimat/billhub.
# Запуск на VPS из /opt/portals/technic:
#   docker compose -f deploy/docker-compose.yml -p technic up -d
# Секреты: /etc/technic-portal/prod.env (root:docker, 0640), вне git и образа.
# Миграции: docker compose -p technic --profile tools run --rm migrate
# Seed admin:  docker compose -p technic --profile tools run --rm seed
name: technic

x-common-env: &common-env
  env_file:
    - ${ENV_FILE:-/etc/technic-portal/prod.env}
  environment:
    NODE_ENV: production
    TRUST_PROXY: ${TRUST_PROXY:-true}

services:
  # Имена сервисов = DNS-алиасы. Короткие `api`/`web` на edge конфликтуют с zakupki.
  technic-api:
    <<: *common-env
    image: technic-api:${TAG:-latest}
    container_name: technic-api
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    volumes:
      - /etc/technic-portal/certs:/etc/technic-portal/certs:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Только internal: снаружи API через technic-web (/api → technic-api).
    networks: [internal]

  technic-worker:
    <<: *common-env
    image: technic-worker:${TAG:-latest}
    container_name: technic-worker
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    volumes:
      - /etc/technic-portal/certs:/etc/technic-portal/certs:ro
    restart: unless-stopped
    depends_on: [technic-api]
    networks: [internal]

  technic-web:
    image: technic-web:${TAG:-latest}
    container_name: technic-web
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    depends_on: [technic-api]
    # Без host-ports: снаружи только infra-nginx через сеть edge
    restart: unless-stopped
    networks: [internal, edge]

  migrate:
    <<: *common-env
    image: technic-api:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    volumes:
      - /etc/technic-portal/certs:/etc/technic-portal/certs:ro
    command: ['pnpm', '--filter', '@technic/api', 'db:migrate']
    restart: 'no'
    profiles: [tools]
    networks: [internal]

  seed:
    <<: *common-env
    image: technic-api:${TAG:-latest}
    volumes:
      - /etc/technic-portal/certs:/etc/technic-portal/certs:ro
    # ADMIN_EMAIL / ADMIN_PASSWORD передаются через -e при run
    command: ['pnpm', '--filter', '@technic/api', 'seed:admin']
    restart: 'no'
    profiles: [tools]
    networks: [internal]

networks:
  internal:
    driver: bridge
  edge:
    external: true
