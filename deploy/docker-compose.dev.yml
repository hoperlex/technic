# Локальная инфраструктура для разработки: PostgreSQL + MinIO (S3-совместимо).
# Приложение запускается отдельно: pnpm dev (api + worker + web).
# Запуск: docker compose -f deploy/docker-compose.dev.yml -p technic-dev up -d
name: technic-dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: technic_portal
      POSTGRES_USER: technic
      POSTGRES_PASSWORD: technic
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U technic -d technic_portal']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata: {}
  miniodata: {}
